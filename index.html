<style>

    --green: #478B34;
    --green-light: #9FC195;

    border: 1px solid #e0e0e0;
    border-radius: 12px;
    padding: 20px;
    width: 300px;

  #tweaks-panel h3 { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #478B34; margin-bottom: 16px; }

  .tweak-label { font-size: 11px; font-weight: 600; color: #868485; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; display: block; }

  <div class="tweak-group">

// ─── App ───────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  // Tweaks panel bridge
  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').classList.add('visible');
      }
      if (e.data?.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').classList.remove('visible');
      }
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    // Wire up DOM tweaks panel inputs
    const empInput = document.getElementById('tw-employer');
    const indSelect = document.getElementById('tw-industry');
    const themeBtns = document.querySelectorAll('#tw-theme .tweak-btn');

    empInput.value = tweaks.employerName !== "Your Company" ? tweaks.employerName : "";
    indSelect.value = tweaks.industry;

    empInput.addEventListener('input', () => {
      const v = empInput.value || "Your Company";
      setTweaks(t => ({ ...t, employerName: v }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { employerName: v } }, '*');
    });

    indSelect.addEventListener('change', () => {
      setTweaks(t => ({ ...t, industry: indSelect.value }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { industry: indSelect.value } }, '*');
    });

    themeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        themeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const theme = btn.dataset.theme;
        setTweaks(t => ({ ...t, theme }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme } }, '*');
      });
    });
  }, []);

  const T = THEMES[tweaks.theme] || THEMES.professional;

  return (
    <div>
      <Nav employerName={tweaks.employerName} theme={tweaks.theme} T={T} />
      <Hero employerName={tweaks.employerName} industry={tweaks.industry} theme={tweaks.theme} T={T} />
      <ImpactSection employerName={tweaks.employerName} T={T} />
      <ProblemSection industry={tweaks.industry} T={T} />
      <SolutionSection T={T} />
      <TierSection T={T} />
      <ROISection T={T} />
      <OnboardingSection T={T} />
      <Footer T={T} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
